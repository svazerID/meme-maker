<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meme Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; }
        canvas { border: 5px solid #333; max-width: 100%; margin-top: 20px; border-radius: 8px; }
        .controls { background: #222; padding: 20px; border-radius: 12px; margin-top: 20px; display: grid; gap: 10px; width: 400px; }
        input, textarea { padding: 10px; border-radius: 5px; border: none; font-size: 1rem; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Meme Maker Canvas</h2>
    
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <textarea id="textInput" placeholder="Ketik teks meme di sini... (Support Emoji 🚀)"></textarea>
        <button id="downloadBtn">Download Meme</button>
    </div>

    <canvas id="memeCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
