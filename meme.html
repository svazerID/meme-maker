<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator Pro - Custom Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: #1e293b;
        }

        .impact-font {
            font-family: 'Impact', 'Anton', sans-serif;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10">

    <div class="max-w-6xl w-full">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2 impact-font tracking-wider">MEME MAKER</h1>
            <p class="text-slate-400 tracking-widest text-sm"></p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
            <!-- Panel Kontrol -->
            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Langkah 1: Unggah Foto</label>
                    <div class="relative group">
                        <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="border-2 border-dashed border-slate-600 group-hover:border-indigo-500 py-4 px-6 rounded-xl text-center transition-all">
                            <span class="text-sm text-slate-300 group-hover:text-indigo-400">Pilih File dari Komputer</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="block text-xs font-bold text-slate-400 uppercase">Langkah 2: Isi Teks</label>
                    
                    <div class="space-y-3">
                        <input type="text" id="topText" placeholder="Teks Atas..." 
                            class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold impact-font text-xl placeholder:text-slate-600">
                        
                        <input type="text" id="bottomText" placeholder="Teks Bawah..." 
                            class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold impact-font text-xl placeholder:text-slate-600">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Ukuran Font: <span id="sizeVal">50</span>px</label>
                        <input type="range" id="fontSize" min="20" max="120" value="60" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Ketebalan Garis</label>
                        <input type="range" id="strokeWidth" min="1" max="15" value="6" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-700 flex flex-col sm:flex-row gap-4">
                    <button id="downloadBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-8 rounded-2xl transition-all shadow-lg shadow-indigo-900/20 uppercase tracking-widest flex items-center justify-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Download PNG
                    </button>
                    <button id="resetBtn" class="bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold py-4 px-6 rounded-2xl transition-all uppercase text-sm">
                        Reset
                    </button>
                </div>
            </div>

            <!-- Area Preview -->
            <div class="flex flex-col items-center sticky top-10">
                <div class="relative w-full max-w-md bg-slate-800 p-2 rounded-lg border border-slate-700">
                    <canvas id="memeCanvas" class="w-full"></canvas>
                    <div id="emptyState" class="absolute inset-2 flex flex-col items-center justify-center text-slate-500 bg-slate-900 rounded border-2 border-dashed border-slate-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="font-bold uppercase tracking-tighter text-lg">Menunggu Gambar...</p>
                    </div>
                </div>
                <div class="mt-6 flex items-center gap-3 px-4 py-2 bg-slate-800 rounded-full border border-slate-700">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Live Editor Active</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const topTextInput = document.getElementById('topText');
        const bottomTextInput = document.getElementById('bottomText');
        const fontSizeInput = document.getElementById('fontSize');
        const strokeWidthInput = document.getElementById('strokeWidth');
        const sizeVal = document.getElementById('sizeVal');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const emptyState = document.getElementById('emptyState');

        let currentImage = null;

        function drawMeme() {
            if (!currentImage) return;

            sizeVal.textContent = fontSizeInput.value;

            const maxWidth = 1000;
            const ratio = Math.min(maxWidth / currentImage.width, 1);
            canvas.width = currentImage.width * ratio;
            canvas.height = currentImage.height * ratio;

            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);

            const size = parseInt(fontSizeInput.value) * ratio;
            const stroke = parseInt(strokeWidthInput.value) * ratio;
            
            ctx.font = `${size}px Impact, Anton, sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = stroke;
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;

            // Mengambil teks apa adanya (case-sensitive)
            const topText = topTextInput.value;
            const bottomText = bottomTextInput.value;

            if (topText) {
                ctx.textBaseline = 'top';
                ctx.strokeText(topText, canvas.width / 2, 20);
                ctx.fillText(topText, canvas.width / 2, 20);
            }

            if (bottomText) {
                ctx.textBaseline = 'bottom';
                ctx.strokeText(bottomText, canvas.width / 2, canvas.height - 20);
                ctx.fillText(bottomText, canvas.width / 2, canvas.height - 20);
            }
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    emptyState.style.display = 'none';
                    drawMeme();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        [topTextInput, bottomTextInput, fontSizeInput, strokeWidthInput].forEach(input => {
            input.addEventListener('input', drawMeme);
        });

        downloadBtn.addEventListener('click', function() {
            if (!currentImage) return;
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `meme-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });

        resetBtn.addEventListener('click', function() {
            currentImage = null;
            imageInput.value = '';
            topTextInput.value = '';
            bottomTextInput.value = '';
            emptyState.style.display = 'flex';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        document.fonts.ready.then(() => {
            if (currentImage) drawMeme();
        });
    </script>
</body>
</html>
